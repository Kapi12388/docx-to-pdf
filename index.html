    let currentQuestions = [];
    let currentIndex = 0;
    let score = 0;
    let answeredCount = 0;
    let errors = [];

    function initQuiz() {
        currentQuestions = [...rawQuestions].sort(() => Math.random() - 0.5);
        currentIndex = 0;
        score = 0;
        answeredCount = 0;
        errors = [];
        showQuestion();
    }

    function showQuestion() {
        const q = currentQuestions[currentIndex];
        document.getElementById('question-number').innerText = `Pytanie ${currentIndex + 1} z ${currentQuestions.length}`;
        document.getElementById('q-text').innerText = q.q;
        
        const optionsDiv = document.getElementById('q-options');
        optionsDiv.innerHTML = '';
        
        q.o.forEach((opt, idx) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(idx);
            optionsDiv.appendChild(btn);
        });

        document.getElementById('feedback').style.display = 'none';
        document.getElementById('next-btn').disabled = true;
        document.getElementById('prev-btn').disabled = currentIndex === 0;
        
        const progress = ((currentIndex) / currentQuestions.length) * 100;
        document.getElementById('progress-fill').style.width = progress + '%';
    }

    function checkAnswer(selectedIdx) {
        const q = currentQuestions[currentIndex];
        const buttons = document.getElementsByClassName('option-btn');
        
        for (let btn of buttons) btn.disabled = true;

        const feedbackDiv = document.getElementById('feedback');
        const feedbackMsg = document.getElementById('feedback-msg');
        const explanation = document.getElementById('explanation');
        feedbackDiv.style.display = 'block';

        if (selectedIdx === q.a) {
            buttons[selectedIdx].classList.add('correct');
            feedbackMsg.innerText = "Doskonale! Poprawna odpowiedź.";
            feedbackDiv.className = 'feedback-correct';
            score++;
        } else {
            buttons[selectedIdx].classList.add('wrong');
            buttons[q.a].classList.add('correct');
            feedbackMsg.innerText = `Błąd. Poprawna odpowiedź to: ${q.o[q.a]}`;
            feedbackDiv.className = 'feedback-wrong';
            errors.push({ id: q.id, q: q.q, correct: q.o[q.a] });
        }

        explanation.innerText = q.e;
        answeredCount++;
        updateLiveScore();
        document.getElementById('next-btn').disabled = false;
    }

    function updateLiveScore() {
        document.getElementById('score-live').innerText = `Wynik: ${score}/${answeredCount}`;
    }

    function nextQuestion() {
        if (currentIndex < currentQuestions.length - 1) {
            currentIndex++;
            showQuestion();
        } else {
            showFinalResults();
        }
    }

    function prevQuestion() {
        if (currentIndex > 0) {
            currentIndex--;
            showQuestion();
        }
    }

    function skipQuestion() {
        nextQuestion();
    }

    function showFinalResults() {
        document.getElementById('quiz-view').style.display = 'none';
        document.getElementById('results').style.display = 'block';
        
        const percent = Math.round((score / currentQuestions.length) * 100);
        document.getElementById('final-score').innerText = `Wynik: ${score} / ${currentQuestions.length} (${percent}%)`;
        
        const errorSummary = document.getElementById('error-summary');
        if (errors.length === 0) {
            errorSummary.innerHTML = "<h3>Gratulacje! Brak błędnych odpowiedzi.</h3>";
        } else {
            errorSummary.innerHTML = "<h3>Lista błędnych pytań:</h3>";
            errors.forEach(err => {
                errorSummary.innerHTML += `
                    <div class="error-item">
                        <strong>Pytanie ${err.id}:</strong> ${err.q}<br>
                        <span style="color: green">Poprawna: ${err.correct}</span>
                    </div>`;
            });
        }
    }

    initQuiz();
</script>
